# comment: ci - run the lsc tests on push and pull request
name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # no real eza needed: the tests stub it through EZA_BIN
      - run: sh tests/run-tests.sh
